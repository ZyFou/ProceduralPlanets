<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07090c">
<title>Procedural Planets — Stylized Planet Studio</title>
<style>
  html, body { margin: 0; height: 100%; background: #07090c; }
  #boot-splash {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: #07090c; color: #8b93a3; z-index: 100;
    font-family: 'Segoe UI', system-ui, sans-serif;
    transition: opacity .45s ease; pointer-events: none;
  }
  #boot-splash.hide { opacity: 0; }
  .bs-logo {
    width: 36px;
    height: 36px;
    color: #2563eb;
    animation: bs-fade 1.4s ease-in-out infinite;
  }
  .bs-title { font-size: 13px; letter-spacing: .22em; text-transform: uppercase; }
  @keyframes bs-fade { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
</style>
</head>
<body>
  <div id="boot-splash">
    <svg class="bs-logo" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"></circle>
      <path d="M4.2 14.1c-1.2-.8-1.8-1.7-1.5-2.6.6-1.8 5.2-2 10.3-.5s8.8 4.2 8.2 6c-.3.9-1.5 1.4-3.3 1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
      <path d="M19.8 9.9c1.2.8 1.8 1.7 1.5 2.6-.6 1.8-5.2 2-10.3.5S2.2 8.8 2.8 7c.3-.9 1.5-1.4 3.3-1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
    </svg>
    <div class="bs-title">Procedural Planets</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
