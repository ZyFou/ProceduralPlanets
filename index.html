<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07090c">
<title>Procedural Planets — Stylized Planet Studio</title>
<style>
  html, body { margin: 0; height: 100%; background: #07090c; }
  #boot-splash {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: #07090c; color: #8b93a3; z-index: 100;
    font-family: 'Segoe UI', system-ui, sans-serif;
    transition: opacity .45s ease; pointer-events: none;
  }
  #boot-splash.hide { opacity: 0; }
  .bs-orb {
    width: 46px; height: 46px; border-radius: 50%;
    background: radial-gradient(circle at 34% 30%, #67d1ff 0%, #2a6fd6 45%, #0c1d3a 100%);
    box-shadow: 0 0 34px rgba(64, 140, 255, .35);
    animation: bs-pulse 1.6s ease-in-out infinite;
  }
  .bs-title { font-size: 13px; letter-spacing: .22em; text-transform: uppercase; }
  @keyframes bs-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
</style>
</head>
<body>
  <div id="boot-splash">
    <div class="bs-orb"></div>
    <div class="bs-title">Procedural Planets</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
